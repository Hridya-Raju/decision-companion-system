<!DOCTYPE html>
<html>
<head>
  <title>Decision Companion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toast message -->
  <div id="toast" class="toast hide"></div>

  <br>
  <h2 style="align-items: center;">Decision Companion System</h2>
  <div id="calculation">
    <form id="imput-form" class="input-form" action="#" method="POST">
      <div class="field">
        <label for="options">Options</label>
        <input type="text" id="options"  placeholder="Comma separated">
      </div>
      <div class="field">
        <label for="criteria">Criteria</label>
        <input type="text" id="criteria"  placeholder="Comma separated">
      </div>
      <div class="field">
        <label for="weights">Weights</label>
        <input type="text" id="weights"  placeholder="Comma separated">
      </div>
      <div class="field">
        <label for="scores">Scores</label>
        <input type="text" id="scores"  placeholder="Scores rows like: 7 6 | 5 9">
      </div>
    </form>


    <button id="evaluateBtn">Evaluate</button>
  </div>

  <div id="result" style="display: none;">
    <div>
      <h3>Decision Result</h3>
      <table border="1" class="result-table" id="resultTable">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Option</th>
            <th>Total Score</th>
            <th>Explanation</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div>
      <h3>Score Matrix</h3>
      <table border="1" class="result-table" id="matrixTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="summary">
      <h3 id="summary-text"></h3>
    </div>

    <button id="reevaluate">Re-evaluate</button>
    <button id="new-decision">New Decision</button>
  </div>

  <script src="decision.js"></script>
</body>
</html>
